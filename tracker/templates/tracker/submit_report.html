{% extends 'tracker/base.html' %}
{% block content %}
<div class="card">
    <h2>📝 Submit Weekly Report</h2>
    <form method="post">
        {% csrf_token %}
        {% for field in form %}
            <label>{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}
                <small style="color:red;">{{ field.errors }}</small>
            {% endif %}
        {% endfor %}
        <button type="submit" class="btn">Submit Report</button>
        <a href="{% url 'student_dashboard' %}" class="btn btn-danger" style="margin-left:10px;">Cancel</a>
    </form>
</div>
{% endblock %}
