{% extends 'tracker/base.html' %}
{% block content %}
<div class="card" style="max-width: 500px; margin: 40px auto;">
    <h2>🏢 Complete Your Attachment Details</h2>
    <p style="margin-bottom:20px; color:#666;">Please fill in your attachment information to continue.</p>
    <form method="post">
        {% csrf_token %}
        {% for field in form %}
            <label>{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}
                <small style="color:red;">{{ field.errors }}</small>
            {% endif %}
        {% endfor %}
        <button type="submit" class="btn" style="width:100%; margin-top:10px;">Save & Continue</button>
    </form>
</div>
{% endblock %}
